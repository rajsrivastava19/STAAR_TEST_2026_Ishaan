<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1366, initial-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#7B2CBF" />
    <title>Math STAAR Test Prep for Ishaan</title>
    <script>
      (function () {
        var TIERS = [
          { name: 'small',  w: 1024, h: 768  },
          { name: 'medium', w: 1366, h: 900  },
          { name: 'large',  w: 1920, h: 1080 }
        ];
        function fit() {
          var vw = window.innerWidth, vh = window.innerHeight;
          var vpArea = vw * vh;
          var best = TIERS[1]; // default medium
          var bestDiff = Infinity;
          for (var i = 0; i < TIERS.length; i++) {
            var diff = Math.abs(vpArea - TIERS[i].w * TIERS[i].h);
            if (diff < bestDiff) { bestDiff = diff; best = TIERS[i]; }
          }
          var scale = Math.min(vw / best.w, vh / best.h);
          var root = document.documentElement;
          root.style.width = best.w + 'px';
          root.style.height = best.h + 'px';
          root.setAttribute('data-tier', best.name);
          root.style.transform = 'scale(' + scale + ')';
          root.style.transformOrigin = 'top left';
          /* Center horizontally when letterboxed */
          var scaledW = best.w * scale;
          var scaledH = best.h * scale;
          root.style.marginLeft = scaledW < vw ? ((vw - scaledW) / 2) + 'px' : '0px';
          root.style.marginTop = scaledH < vh ? ((vh - scaledH) / 2) + 'px' : '0px';
        }
        fit();
        window.addEventListener('resize', fit);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
