  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #122a12; font-family: 'Nunito', sans-serif; }
    .artboard-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #122a12; }
    .artboard-container svg { width: 100%; height: 100%; }

    @keyframes dino-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes firefly-glow {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.8; }
    }
    .bob { animation: dino-bob 4s ease-in-out infinite; }
    .firefly-dot { animation: firefly-glow 6s ease-in-out infinite; }

    .mtn-click { cursor: pointer; }
    .mtn-click:hover .mtn-inner { filter: drop-shadow(0 0 16px rgba(255,202,40,0.7)); }

    .back-link {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      background: rgba(0,0,0,0.7); color: #4CAF50; padding: 8px 16px;
      border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 14px; border: 2px solid #4CAF50;
    }
    .back-link:hover { background: #4CAF50; color: white; }
    .strategy-badge {
      position: fixed; bottom: 12px; left: 12px; z-index: 100;
      background: rgba(0,0,0,0.8); color: #FFCA28; padding: 8px 16px;
      border-radius: 12px; font-weight: 800; font-size: 13px; border: 2px solid #FFCA28;
