<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#7B2CBF" />
    <title>Math STAAR Test Prep for Ishaan</title>
    <script>
      (function () {
        var TIERS = [
          { name: 'xs',    w: 1024, h: 768  },
          { name: 's',     w: 1280, h: 800  },
          { name: 'm',     w: 1366, h: 768  },
          { name: 'l',     w: 1680, h: 1050 },
          { name: 'xl',    w: 1920, h: 1080 },
          { name: 'xxl',   w: 2560, h: 1440 },
          { name: 'ultra', w: 3840, h: 2160 }
        ];
        function fit() {
          var vw = window.innerWidth, vh = window.innerHeight;
          var vpArea = vw * vh;
          var best = TIERS[2];
          var bestDiff = Infinity;
          for (var i = 0; i < TIERS.length; i++) {
            var diff = Math.abs(vpArea - TIERS[i].w * TIERS[i].h);
            if (diff < bestDiff) { bestDiff = diff; best = TIERS[i]; }
          }
          var scale = Math.min(vw / best.w, vh / best.h);
          var root = document.documentElement;
          root.style.width = best.w + 'px';
          root.style.height = best.h + 'px';
          root.setAttribute('data-tier', best.name);
          root.setAttribute('data-ratio', (vw / vh).toFixed(3));
          root.style.transform = 'scale(' + scale + ')';
          root.style.transformOrigin = 'top left';
          var scaledW = best.w * scale;
          var scaledH = best.h * scale;
          root.style.marginLeft = scaledW < vw ? ((vw - scaledW) / 2) + 'px' : '0px';
          root.style.marginTop = scaledH < vh ? ((vh - scaledH) / 2) + 'px' : '0px';
        }
        fit();
        window.addEventListener('resize', fit);
      })();
    </script>
    <script type="module" crossorigin src="/STAAR_TEST_2026_Ishaan/assets/index-BASL-SiA.js"></script>
    <link rel="stylesheet" crossorigin href="/STAAR_TEST_2026_Ishaan/assets/index-CKtFTxV0.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
